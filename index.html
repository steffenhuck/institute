<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Institute for the Advancement of Dictatorships</title>
  <meta name="description" content="The Institute for the Advancement of Dictatorships is an independent research and teaching institution in Geneva, Switzerland, dedicated to the rigorous study of authoritarian governance, power consolidation, and non-democratic rule.">
  <meta name="keywords" content="Institute for the Advancement of Dictatorships, authoritarian governance, dictatorship, power consolidation, Geneva, IAD, Caesar, Machiavelli, Robespierre, Stalin, Goebbels, Torquemada, Jiang Qing, Bokassa, Napoleon">
  <script data-goatcounter="https://steffenhuck.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
  <style>
    :root {
      --background: #f0f0ee;
      --text: #2f2f2b;
      --meta: #6e6e64;

      --card-1: #e8e8e8;
      --card-2: #dcdcdc;
      --card-3: #d0d0d0;
      --card-4: #c4c4c4;
      --card-5: #b8b8b8;
      --card-6: #acacac;
      --card-7: #a0a0a0;

      --hover-1: #f0f2c8;
      --hover-2: #e8eab0;
      --hover-3: #e0e298;
      --hover-4: #d8db80;
      --hover-5: #d0d368;
      --hover-6: #c8cc50;
      --hover-7: #c0c438;

      --lake: #d0d0d0;
      --badge-bg: #f0f2c8;
      --badge-ring: #a8a8a0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; }

    body {
      background: var(--background);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ── HERO ── */

    .hero {
      position: relative;
      max-width: 760px;
      margin: 0 auto;
      padding: 80px 24px 56px;
    }

    /* ── BADGE ── */

    .badge {
      position: absolute;
      top: 64px;
      right: 24px;
      width: 118px;
      height: 118px;
      border-radius: 50%;
      background: var(--badge-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 12px 12px 12px;
    }

    .badge-number {
      font-size: 2.1rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      color: #a0a098;
    }

    .badge-text {
      margin-top: 0.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
    }

    .badge-years {
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #a0a098;
      line-height: 1.2;
    }

    .badge-excellence {
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #a0a098;
      line-height: 1.2;
    }

    /* ── INSTITUTE NAME ── */

    .institute-name {
      font-size: 2.1rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      line-height: 1.18;
      color: var(--text);
      text-transform: uppercase;
      max-width: 520px;
    }

    .founded {
      margin-top: 1.1rem;
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      color: var(--meta);
      font-style: italic;
      font-weight: 400;
    }

    .lake-svg {
      margin-top: 2.8rem;
      width: 100%;
      max-width: 640px;
      height: auto;
      display: block;
    }

    /* ── CARDS ── */

    .cards {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .card {
      display: block;
      width: 100%;
      padding: 2.4rem 2.8rem;
      margin-bottom: 2px;
      text-decoration: none;
      color: var(--text);
      transition: background-color 0.18s ease;
    }

    .card:last-child { margin-bottom: 0; }

    .card-title {
      font-size: 1.08rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
    }

    .card-1 { background: var(--card-1); }
    .card-2 { background: var(--card-2); }
    .card-3 { background: var(--card-3); }
    .card-4 { background: var(--card-4); }
    .card-5 { background: var(--card-5); }
    .card-6 { background: var(--card-6); }
    .card-7 { background: var(--card-7); }

    .card-1:hover { background: var(--hover-1); }
    .card-2:hover { background: var(--hover-2); }
    .card-3:hover { background: var(--hover-3); }
    .card-4:hover { background: var(--hover-4); }
    .card-5:hover { background: var(--hover-5); }
    .card-6:hover { background: var(--hover-6); }
    .card-7:hover { background: var(--hover-7); }

    /* ── FOOTER ── */

    footer {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px 48px;
      font-size: 0.82rem;
      letter-spacing: 0.07em;
      color: var(--meta);
      text-transform: uppercase;
      text-align: center;
    }

    /* ── MOBILE ── */

    @media (max-width: 640px) {
      .hero { padding: 56px 20px 40px; }
      .badge {
        width: 114px;
        height: 114px;
        top: 48px;
        right: 20px;
      }
      .badge-number { font-size: 2.6rem; }
      .badge-years { font-size: 0.5rem; }
      .badge-excellence { font-size: 0.64rem; }
      .institute-name {
        font-size: 1.5rem;
        max-width: calc(100% - 100px);
      }
      .lake-svg { margin-top: 2rem; }
      .cards { padding: 0 20px 56px; }
      .card { padding: 1.8rem 1.6rem; }
      .card-title { font-size: 0.96rem; }
    }
  </style>
</head>
