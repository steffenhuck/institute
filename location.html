<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Location — The Institute for the Advancement of Dictatorships</title>
  <meta name="description" content="The location of the Institute for the Advancement of Dictatorships, Geneva.">
  <script data-goatcounter="https://steffenhuck.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
  <style>
    :root {
      --background: #c8cc50;
      --text: #2f2f2b;
      --meta: #6e6e64;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; }

    body {
      background: var(--background);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      position: relative;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 80px 24px 80px;
    }

    .institute-name {
      font-size: 2.1rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      line-height: 1.18;
      color: var(--text);
      text-transform: uppercase;
      text-decoration: none;
      display: block;
    }

    .institute-name:hover { opacity: 0.75; }

    .page-title-wrap {
      margin-top: 3.2rem;
      margin-bottom: 3.2rem;
      text-align: center;
    }

    .page-title {
      display: inline-block;
      background: #e8e8e8;
      padding: 0.7rem 1.4rem;
      border-radius: 32px;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--meta);
    }

    .body-text p {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 1.6rem;
    }

    .villa {
      display: block;
      margin: 2.8rem auto 0;
      width: 100%;
      max-width: 100%;
      height: auto;
    }

    .back {
      display: block;
      margin-top: 3.6rem;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--meta);
      text-decoration: none;
    }

    .back:hover { color: var(--text); }

    @media (max-width: 640px) {
      .container { padding: 56px 20px 56px; }
      .institute-name { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="container">

    <a href="index.html" class="institute-name">The Institute<br>for the Advancement<br>of Dictatorships</a>

    <div class="page-title-wrap">
      <p class="page-title">Our Location</p>
    </div>

    <div class="body-text">
      <p>The Institute occupies a nineteenth-century villa on the shores of Lake Geneva, Switzerland. It has been gifted to us by our founder.</p>
    </div>

    <img class="villa" src="villa.png" alt="The Institute, Lake Geneva">

    <a href="index.html" class="back">← The Institute</a>

  </div>

</body>
</html>
